name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Sunday at 03:00 UTC so a week-old token leak still gets flagged.
    - cron: '0 3 * * 0'

jobs:
  secrets:
    name: secret-scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Gitleaks scans the commit history for common secret patterns
      # (AWS, GitHub tokens, slack xoxb-*, private keys, etc).
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: npm-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm audit` exits non-zero on high-severity issues. --prod
      # filters dev-only dependencies so a vite-ecosystem CVE with no
      # runtime impact doesn't block PRs; switch to a full audit once
      # the tree stabilises.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
