<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56" role="img" aria-label="Flowdruid">
  <title>Flowdruid</title>
  <desc>Rotating triskelion mark next to the Flowdruid wordmark</desc>
  <style>
    .fd-rotate {
      transform-origin: 28px 28px;
      animation: fd-spin 20s linear infinite;
    }
    @keyframes fd-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .fd-rotate { animation: none; }
    }
    .fd-text {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.6px;
    }
    .fd-flow { fill: #1A1A1A; }
    .fd-druid { fill: #534AB7; }
  </style>
  <g class="fd-rotate">
    <g transform="translate(28 28)">
      <path d="M 0 -3.5 C 5 -8, 15 -12, 17 -22 C 12 -20.5, 3.5 -17, 0 -3.5 Z" fill="#534AB7"/>
      <g transform="rotate(120)">
        <path d="M 0 -3.5 C 5 -8, 15 -12, 17 -22 C 12 -20.5, 3.5 -17, 0 -3.5 Z" fill="#534AB7"/>
      </g>
      <g transform="rotate(240)">
        <path d="M 0 -3.5 C 5 -8, 15 -12, 17 -22 C 12 -20.5, 3.5 -17, 0 -3.5 Z" fill="#534AB7"/>
      </g>
      <circle r="3.5" fill="#534AB7"/>
    </g>
  </g>
  <text class="fd-text" x="64" y="37">
    <tspan class="fd-flow">Flow</tspan><tspan class="fd-druid">druid</tspan>
  </text>
</svg>
